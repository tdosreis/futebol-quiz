    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: #0a0f0a;
      display: flex;
      align-items: center;
      justify-content: center;

    #qz {
      background: #060e08;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      color: #fff;
      min-height: 500px;
      width: 100%;
      max-width: 680px;
    }

    #grid-overlay {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px);
      background-size: 52px 52px;
      pointer-events: none;
      z-index: 0;
    }

    #ct { position: relative; z-index: 1; }

    /* ── Screen entrance ── */
    @keyframes screenIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #ct > div { animation: screenIn .22s ease-out; }

    /* ── Badge: tap press ── */
    .b { touch-action: manipulation; }
    .b:active { transform: scale(0.93) !important; filter: brightness(1.2); }

    /* ── Category card hover ── */
    .cc { touch-action: manipulation; }
    .cc:hover  { transform: scale(1.03); background: rgba(255,255,255,.07) !important; }
    .cc:active { transform: scale(0.97) !important; }

    /* ── Difficulty card hover ── */
    .dc { touch-action: manipulation; }
    .dc:hover  { transform: translateY(-2px); background: rgba(255,255,255,.08) !important; }
    .dc:active { transform: scale(0.98) !important; }

    /* ── Badge animations ── */
    @keyframes badgePop {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.14); }
      65%  { transform: scale(1.04); }
      100% { transform: scale(1.06); }
    }
    @keyframes correctGlow {
      0%, 100% { box-shadow: 0 0 0 3px #00e676, 0 0 20px rgba(0,230,118,.45); }
      50%       { box-shadow: 0 0 0 4px #00e676, 0 0 38px rgba(0,230,118,.8), 0 0 64px rgba(0,230,118,.25); }
    }
    @keyframes wrongShake {
      0%, 100% { transform: translateX(0) scale(1); }
      18%      { transform: translateX(-6px) scale(0.96); }
      36%      { transform: translateX(6px) scale(0.96); }
      54%      { transform: translateX(-4px); }
      72%      { transform: translateX(4px); }
      88%      { transform: translateX(-2px); }
    }
    @keyframes scoreUp {
      0%, 100% { transform: scale(1); }
      45%      { transform: scale(1.45); }
    }
    @keyframes fireBob {
      0%, 100% { transform: scale(1) rotate(0deg); }
      30%      { transform: scale(1.12) rotate(-4deg); }
      70%      { transform: scale(1.06) rotate(4deg); }
    }
    @keyframes ctaBounce {
      0%, 100% { transform: translateY(0); box-shadow: 0 4px 24px rgba(255,215,0,.25); }
      50%      { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(255,215,0,.45); }
    }
    @keyframes timerPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }

    .b-correct { animation: correctGlow 1.4s ease-in-out infinite !important; transform: scale(1.04) !important; }
    .b-wrong   { animation: wrongShake .45s ease-out !important; }
    .b-sel     { animation: badgePop .18s ease-out forwards; }

    .score-up  { animation: scoreUp .28s ease-out; }
    .fire-bob  { animation: fireBob .7s ease-in-out infinite; }

    #cta-btn   { animation: ctaBounce 2.2s ease-in-out infinite; }
    .timer-low { animation: timerPulse .55s ease-in-out infinite; }

    /* ── Misc ── */
    button { font-family: 'Inter', system-ui, sans-serif; }
  </style>

   WEB AUDIO — procedural sound effects
═══════════════════════════════════════════════════ */
let _AC = null;
function AC() {
  if (!_AC) _AC = new (window.AudioContext || window.webkitAudioContext)();
  return _AC;
}

function beep(freq, dur, type='sine', vol=0.18, freqEnd=null) {
  try {
    const ac = AC();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + dur);
  } catch(e) {}
}

      setTimeout(() => beep(f, d, 'triangle', .2), i*90));
  },
  almost()  { beep(440, .18, 'sine', .15); },
  wrong()   { beep(200, .32, 'sawtooth', .14, 90); },
  select()  { beep(660, .07, 'sine', .1, 600); },
  swipe()   { beep(300, .12, 'sine', .08, 500); },
};

function buildMixedGame(n) {
  // Flatten all questions, tagging each with its source category
  const allQs = CATS.flatMap(c => c.qs.map(q => ({ ...q, _cat: c })));
  // Fisher-Yates shuffle
  for (let i = allQs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allQs[i], allQs[j]] = [allQs[j], allQs[i]];
  }
  return {
    id: 'mixed', name: 'Futebol Quiz BR', emoji: '⚽',
    tag: 'Perguntas misturadas', col: '#FFD700', diff: 'Variado',
    qs: allQs.slice(0, Math.min(n, allQs.length)),
  };
}

function getDisp(q) {
  if (q.type === 'player') {
    const right = q.a.map(id => PL.find(p => p.id === id)).filter(Boolean);
    const wrong  = PL.filter(p => !q.a.includes(p.id)).sort(() => Math.random() - .5);
    return [...right, ...wrong.slice(0, 10 - right.length)].sort(() => Math.random() - .5);
  }
  const right = q.a.map(id => CL.find(c => c.id === id)).filter(Boolean);
  const wrong  = CL.filter(c => !q.a.includes(c.id)).sort(() => Math.random() - .5);
  return [...right, ...wrong.slice(0, 10 - right.length)].sort(() => Math.random() - .5);
}

/* ═══════════════════════════════════════════════════
   SVG — CLUB CRESTS
═══════════════════════════════════════════════════ */
function crest(id) {
  const SH = 'M30 3L57 17L57 43L30 57L3 43L3 17Z';
  const ci  = 'CX' + id.replace(/\W/g, '');
  const D   = `<defs><clipPath id="${ci}"><path d="${SH}"/></clipPath></defs>`;
  const B   = `<path d="${SH}" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="2"/>`;
  const c   = `clip-path="url(#${ci})"`;
  const r   = (x,y,w,h,f)    => `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${f}" ${c}/>`;
  const pg  = (pts,f)         => `<polygon points="${pts}" fill="${f}" ${c}/>`;
  const el  = (cx,cy,rx,ry,f) => `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${f}" ${c}/>`;
  const fc  = (cx,cy,r2,f)    => `<circle cx="${cx}" cy="${cy}" r="${r2}" fill="${f}" ${c}/>`;
  const ln  = (x1,y1,x2,y2,s,w)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${s}" stroke-width="${w}" ${c}/>`;

  function star(cx, cy, ro, ri, f) {
    let pts = '';
    for (let i = 0; i < 10; i++) {
      const a = Math.PI / 5 * i - Math.PI / 2;
      const rad = i % 2 ? ri : ro;
      pts += `${cx + rad * Math.cos(a)},${cy + rad * Math.sin(a)} `;
    }
    return `<polygon points="${pts.trim()}" fill="${f}" ${c}/>`;
  }

  switch (id) {
    case 'flamengo':
      return D + r(0,0,60,60,'#111') + r(0,15,60,15,'#CC1011')
               + r(0,30,60,15,'#111') + r(0,45,60,15,'#CC1011') + B;
    case 'fluminense':
      return D + r(0,0,20,60,'#8B1D3B') + r(20,0,20,60,'#EEE') + r(40,0,20,60,'#2E7D52') + B;
    case 'vasco':
      return D + r(0,0,60,60,'#EEE')
               + pg('0,18 42,60 60,60 60,42 18,0 0,0','#111')
               + r(25,5,10,50,'#EEE') + r(5,25,50,10,'#EEE') + B;
    case 'botafogo':
      return D + r(0,0,60,60,'#111') + star(30,29,18,8,'#EEE') + B;
    case 'corinthians':
      return D + r(0,0,60,60,'#111') + r(30,0,30,60,'#EEE')
               + `<circle cx="30" cy="27" r="13" fill="none"
                   stroke="rgba(120,120,120,.6)" stroke-width="3" ${c}/>`
               + fc(30,27,3,'rgba(120,120,120,.5)') + B;
    case 'palmeiras':
      return D + r(0,0,60,60,'#005C30') + el(30,30,16,20,'#FFF')
               + `<text x="30" y="37" text-anchor="middle" font-size="22" font-weight="900"
                   fill="#005C30" font-family="serif" ${c}>P</text>` + B;
    case 'saopaulo':
      return D + r(0,0,60,20,'#CC0000') + r(0,20,60,12,'#111') + r(0,32,60,28,'#EEE') + B;
    case 'santos':
      return D + r(0,0,60,60,'#111')
               + `<circle cx="30" cy="28" r="17" fill="none" stroke="#EEE" stroke-width="2.5" ${c}/>`
               + ln(30,11,30,45,'#EEE',2) + ln(13,28,47,28,'#EEE',2)
               + ln(18,15,42,41,'#EEE',1.5) + ln(42,15,18,41,'#EEE',1.5)
               + fc(30,28,4,'#EEE') + B;
    case 'gremio':
      return D + r(0,0,60,22,'#3E72B8') + r(0,22,60,14,'#111') + r(0,36,60,24,'#EEE') + B;
    case 'internacional':
      return D + r(0,0,60,60,'#C00000') + star(30,28,17,7,'#FFD700') + B;
    case 'cruzeiro':
      return D + r(0,0,60,60,'#002F8B')
               + star(30,16,9,4,'#EEE')
               + star(18,32,6,3,'#EEE')
               + star(42,32,6,3,'#EEE')
               + star(30,44,6,3,'#EEE') + B;
    case 'atleticomg':
      return D + r(0,0,60,60,'#111')
               + el(30,21,9,10,'#EEE')
               + el(30,40,12,11,'#EEE')
               + pg('27,11 28.5,6 30,4 31.5,6 33,11 31,12 30,9 29,12','#CC0000')
               + pg('38,22 45,24 38,26','#EE8800') + B;
    case 'americamg':
      return D + r(0,0,60,60,'#1A6B3C')
               + el(21,17,7,13,'#EEE')
               + el(39,17,7,13,'#EEE')
               + fc(30,38,12,'#EEE')
               + fc(25,37,2.5,'#1A6B3C')
               + fc(35,37,2.5,'#1A6B3C')
               + el(30,43,3.5,2,'#FF9999') + B;
    case 'atleticopr':
      return D + r(0,0,60,30,'#C00000') + r(0,30,60,30,'#111')
               + `<circle cx="30" cy="30" r="17" fill="none"
                   stroke="#EEE" stroke-width="2.5" ${c}/>`
               + ln(30,13,30,47,'#EEE',3)
               + fc(30,30,5,'#EEE') + B;
    case 'coritiba':
      return D + r(0,0,60,60,'#005C30') + r(0,10,60,10,'#EEE') + r(0,40,60,10,'#EEE') + B;
    case 'bahia':
      return D + r(0,0,30,60,'#003A9B') + r(30,0,30,60,'#CC0000')

    case 'vitoria':
      return D + r(0,0,60,60,'#B80000')

    case 'ceara':
      return D + r(0,0,60,22,'#111') + r(0,22,60,16,'#EEE') + r(0,38,60,22,'#111') + B;
    case 'sport':

    case 'nautico':
      return D + r(0,0,60,60,'#B80000')
               + `<circle cx="30" cy="17" r="7" fill="none" stroke="#EEE" stroke-width="3" ${c}/>`
               + ln(30,24,30,50,'#EEE',3)
               + ln(20,31,40,31,'#EEE',2.5)
               + `<path d="M16 50Q14 44 22 41Q30 38 38 41Q46 44 44 50"
                   fill="none" stroke="#EEE" stroke-width="2.5" ${c}/>` + B;
    case 'pontepreta':
      return D
        + r(0,0,20,20,'#EEE')  + r(20,0,20,20,'#111') + r(40,0,20,20,'#EEE')
        + r(0,20,20,20,'#111') + r(20,20,20,20,'#EEE') + r(40,20,20,20,'#111')
        + r(0,40,20,20,'#EEE') + r(20,40,20,20,'#111') + r(40,40,20,20,'#EEE') + B;
    case 'bragantino':
      return D + r(0,0,60,60,'#B80000') + star(30,28,18,7,'#EEE') + B;
    case 'guarani':
      return D + r(0,0,60,60,'#1A6B3C')
               + pg('30,7 38,23 33,23 33,51 27,51 27,23 22,23','#EEE') + B;
    case 'criciuma':
      return D + r(0,0,60,30,'#111') + r(0,30,60,30,'#D4A800') + B;
    default:
      return D + r(0,0,60,60,'#333')
               + `<text x="30" y="33" text-anchor="middle" font-size="11"

  }
}

/* ═══════════════════════════════════════════════════
   BADGE — one club tile
═══════════════════════════════════════════════════ */
function badge(item) {
  const isPlayer = 'img' in item;
  const isSel   = sel.has(item.id);
  const isAns   = sc === 'reveal' && cat.qs[qi].a.includes(item.id);
  const isWrong = sc === 'reveal' && isSel && !isAns;

  let cls  = 'b';
  let ring = '';
  if (sc === 'reveal') {
    if (isAns)        { cls += ' b-correct'; ring = 'box-shadow:0 0 0 3px #00e676,0 0 20px rgba(0,230,118,.45);'; }
    else if (isWrong) { cls += ' b-wrong';   ring = 'box-shadow:0 0 0 3px #f44336,0 0 20px rgba(244,67,54,.45);'; }
  } else if (isSel) {
    cls += ' b-sel';
    ring = `box-shadow:0 0 0 3px ${cat.col},0 0 16px ${cat.col}66;transform:scale(1.06);`;
  }

  if (isPlayer) {
    return `<div class="${cls}" data-id="${item.id}" style="
        width:100%;aspect-ratio:1;border-radius:9px;cursor:pointer;
        position:relative;user-select:none;
        background:rgba(255,255,255,.06);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
        padding:6px 3px 20px;
        transition:transform .12s,box-shadow .12s,filter .1s;${ring}">
      <div style="width:62%;aspect-ratio:1;border-radius:50%;overflow:hidden;flex-shrink:0;
        border:2px solid rgba(255,255,255,.2);box-shadow:0 2px 8px rgba(0,0,0,.5);">
        <img src="${item.img}" alt="${item.n}"
          style="width:100%;height:100%;object-fit:cover;object-position:top center;pointer-events:none;"
          onerror="this.style.opacity='.25'" />
      </div>
      <span style="font-size:6.5px;color:rgba(255,255,255,.75);text-align:center;
        font-weight:700;font-family:'Inter',system-ui;text-shadow:0 1px 4px rgba(0,0,0,1);
        padding:0 2px;line-height:1.2;position:absolute;bottom:3px;left:0;right:0;">
        ${item.nat} ${item.n}</span>
    </div>`;
  }

  // ── Club tile ──
  return `<div class="${cls}" data-id="${item.id}" style="
      width:100%;aspect-ratio:1;border-radius:9px;cursor:pointer;
      position:relative;overflow:hidden;user-select:none;
      background:rgba(255,255,255,.06);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      transition:transform .12s,box-shadow .12s,filter .1s;${ring}">
    <img src="${LOGOS[item.id]}" alt="${item.n}"
      style="width:72%;height:72%;object-fit:contain;pointer-events:none;flex-shrink:0;"
      onerror="this.style.opacity='.3'" />
    <span style="font-size:7.5px;color:rgba(255,255,255,.7);text-align:center;
      font-weight:700;font-family:'Inter',system-ui;
      text-shadow:0 1px 4px rgba(0,0,0,1);
      padding:0 3px;line-height:1.2;position:absolute;bottom:3px;left:0;right:0;">
      ${item.n}</span>
  </div>`;
}

    <p style="color:rgba(255,255,255,.22);font-size:11px;max-width:260px;
      margin:0;font-family:'Inter',system-ui;line-height:1.6;">
      ${CATS.reduce((n,c)=>n+c.qs.length,0)} perguntas de todas as categorias — misturadas!</p>
    <button id="cta-btn" style="margin-top:6px;background:#FFD700;color:#060e08;
      font-size:18px;font-weight:900;padding:13px 50px;border-radius:28px;
      border:none;cursor:pointer;
      font-family:'Bebas Neue','Impact',sans-serif;
      letter-spacing:3px;">JOGAR AGORA</button>
  </div>`;

  /* ── Difficulty Selection ── */
  if (sc === 'difficulty') return `
  <div style="display:flex;flex-direction:column;min-height:500px;padding:16px;gap:10px;">

    <!-- Header -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <button id="bhome" style="background:rgba(255,255,255,.07);border:none;
        color:rgba(255,255,255,.45);font-size:11px;padding:5px 11px;
        border-radius:12px;cursor:pointer;font-family:'Inter',system-ui;">← Início</button>
      <span style="font-size:13px;font-weight:700;color:rgba(255,255,255,.55);
        font-family:'Inter',system-ui;">Escolha a dificuldade</span>
    </div>

    <!-- Difficulty cards -->
    <div style="display:flex;flex-direction:column;gap:10px;flex:1;justify-content:center;">
      ${DIFFS.map(d => `
      <div class="dc" data-key="${d.key}" data-n="${d.n}" style="
          background:rgba(255,255,255,.04);border:1px solid ${d.col}50;
          border-radius:14px;padding:18px 20px;cursor:pointer;
          display:flex;align-items:center;gap:16px;
          transition:transform .12s,background .12s,box-shadow .12s;
          box-shadow:0 2px 12px rgba(0,0,0,.3);">
        <div style="font-size:36px;flex-shrink:0;
          filter:drop-shadow(0 2px 8px ${d.col}66);">${d.emoji}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:18px;font-weight:900;color:#fff;
            font-family:'Bebas Neue','Impact',sans-serif;letter-spacing:2px;
            line-height:1.1;">${d.label.toUpperCase()}</div>
          <div style="font-size:11px;color:rgba(255,255,255,.45);
            font-family:'Inter',system-ui;margin-top:2px;">${d.desc}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-size:20px;font-weight:900;color:${d.col};
            font-family:'Bebas Neue','Impact',sans-serif;line-height:1;">
            ${d.n}Q</div>
          ${scores[d.key] !== undefined
            ? `<div style="font-size:10px;color:${d.col};font-weight:700;
                font-family:'Inter',system-ui;opacity:.8;margin-top:2px;">
                ★ ${scores[d.key]} pts</div>` : ''}
        </div>
      </div>`).join('')}
    </div>

    <p style="font-size:10px;color:rgba(255,255,255,.2);text-align:center;
      margin:0;font-family:'Inter',system-ui;">
      Todas as categorias misturadas numa partida só</p>
  </div>`;

  /* ── End Screen ── */
  if (sc === 'end') {
    const max = cat.qs.length * 3;
    const pct = Math.round(pts / max * 100);
    const [em, msg] = pct >= 80 ? ['🏆','Craque!'] : pct >= 50 ? ['⚽','Boa jogada!'] : ['😅','Treina mais!'];
    const isRecord = scores[diffKey] !== undefined && pts === scores[diffKey] && pts > 0;
    const curDiff  = DIFFS.find(d => d.key === diffKey);
    return `
    <div style="display:flex;flex-direction:column;align-items:center;
      justify-content:center;min-height:500px;padding:2rem;text-align:center;gap:10px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:2px;
        color:${curDiff.col};font-family:'Inter',system-ui;">
        ${curDiff.emoji} ${curDiff.label.toUpperCase()} · ${cat.qs.length} perguntas</div>
      <div style="font-size:52px;margin:4px 0;filter:drop-shadow(0 2px 12px rgba(0,0,0,.5));">${em}</div>
      <div style="font-size:28px;font-weight:800;color:#FFD700;
        font-family:'Bebas Neue','Impact',sans-serif;letter-spacing:2px;">${msg}</div>
      <div style="font-size:68px;font-weight:900;color:#fff;line-height:1;
        font-family:'Bebas Neue','Impact',sans-serif;">${pts}</div>
      <div style="font-size:13px;color:rgba(255,255,255,.35);font-family:'Inter',system-ui;">
        de ${max} pontos · ${pct}%</div>
      <div style="width:200px;height:6px;background:rgba(255,255,255,.1);
        border-radius:3px;overflow:hidden;margin:4px 0;">
        <div style="height:100%;width:${pct}%;background:${curDiff.col};border-radius:3px;
          transition:width 1s ease-out;"></div>
      </div>
      ${isRecord ? `<div style="font-size:12px;font-weight:800;color:#FFD700;
        font-family:'Inter',system-ui;">🌟 Novo recorde!</div>` : ''}
      <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center;">
        <button id="brep" style="background:${curDiff.col};color:#fff;font-size:14px;
          font-weight:900;padding:10px 24px;border-radius:20px;border:none;cursor:pointer;
          font-family:'Bebas Neue','Impact',sans-serif;letter-spacing:2px;">
          JOGAR DE NOVO</button>
        <button id="bdiff" style="background:rgba(255,255,255,.09);color:#fff;font-size:13px;
          font-weight:700;padding:10px 20px;border-radius:20px;border:none;cursor:pointer;
          font-family:'Inter',system-ui;">
          Mudar dificuldade</button>
      </div>
    </div>`;
  }

  /* ── Quiz / Reveal ── */
  const q    = cat.qs[qi];
  const qcat = q._cat || cat;          // source category for label / colour
  const tpct = (tLeft / 30) * 100;
  const tc   = tLeft > 10 ? qcat.col : tLeft > 5 ? '#FF9800' : '#F44336';
  const timerCls = tLeft <= 5 ? 'timer-low' : '';

  const portSVG = q.port
    ? `<div style="flex-shrink:0;width:54px;height:54px;border-radius:50%;overflow:hidden;
        border:2px solid rgba(255,255,255,.18);box-shadow:0 2px 12px rgba(0,0,0,.5);">
        <img src="${PORT_IMGS[q.port]}" alt="${PORT[q.port].name}"
          style="width:100%;height:100%;object-fit:cover;object-position:top;" /></div>` : '';
  const stadSVG = q.stad
    ? `<div style="flex-shrink:0;width:88px;height:56px;border-radius:8px;overflow:hidden;
        border:1px solid rgba(255,255,255,.12);box-shadow:0 2px 12px rgba(0,0,0,.5);">
        <img src="${STAD_IMGS[q.stad]}" alt="${STAD[q.stad].name}"
          style="width:100%;height:100%;object-fit:cover;" /></div>` : '';
  const qimgEl = q.qimg
    ? `<div style="flex-shrink:0;width:96px;height:64px;border-radius:8px;overflow:hidden;
        border:1px solid rgba(255,255,255,.15);box-shadow:0 2px 12px rgba(0,0,0,.6);">
        <img src="${q.qimg}" alt="momento"
          style="width:100%;height:100%;object-fit:cover;"
          onerror="this.parentElement.style.display='none'" /></div>` : '';

  const scoreChanged = pts !== prevPts;

  return `
  <div style="padding:14px;display:flex;flex-direction:column;gap:10px;min-height:500px;">

    <!-- Header -->
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div style="display:flex;align-items:center;gap:7px;">
        <button id="bexit" style="background:rgba(255,255,255,.07);border:none;
          color:rgba(255,255,255,.4);font-size:11px;padding:4px 10px;
          border-radius:12px;cursor:pointer;font-family:'Inter',system-ui;">✕</button>
        <div style="background:${qcat.col}18;border:1px solid ${qcat.col}30;
          border-radius:16px;padding:3px 10px;font-size:10px;
          font-weight:700;color:${qcat.col};font-family:'Inter',system-ui;">${qcat.emoji} ${qcat.name}</div>
      </div>
      <div style="display:flex;align-items:center;gap:7px;">
        ${streak > 1
          ? `<div class="fire-bob" style="background:rgba(255,100,0,.14);border:1px solid rgba(255,100,0,.22);
              border-radius:12px;padding:2px 8px;font-size:11px;
              color:#FF7700;font-weight:700;font-family:'Inter',system-ui;">🔥${streak}x</div>` : ''}
        <div style="font-size:11px;color:rgba(255,255,255,.32);font-family:'Inter',system-ui;">${qi+1}/${cat.qs.length}</div>
        <div id="score-disp" class="${scoreChanged ? 'score-up' : ''}"
          style="font-size:18px;font-weight:900;color:#FFD700;
            font-family:'Bebas Neue','Impact',sans-serif;letter-spacing:1px;">${pts}
          <span style="font-size:9px;margin-left:1px;color:rgba(255,215,0,.45);
            font-family:'Inter',system-ui;font-weight:600;">pts</span>
        </div>
      </div>
    </div>

    <!-- Timer bar -->
    <div style="height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;">
      <div id="tf" class="${timerCls}" style="height:100%;width:${tpct}%;background:${tc};
        border-radius:2px;transition:width .8s linear;"></div>
    </div>

    <!-- Question card -->
    <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      border-radius:11px;padding:12px 14px;min-height:60px;
      display:flex;align-items:center;gap:10px;">
      ${portSVG}${stadSVG}${qimgEl}
      <p style="font-size:14px;font-weight:600;color:#fff;line-height:1.45;
        margin:0;flex:1;font-family:'Inter',system-ui;">
        ${q.t}</p>
    </div>

    <!-- Club grid: 5×2 -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:7px;">
      ${disp.map(c => badge(c)).join('')}
    </div>

    <!-- Footer -->
    ${sc === 'quiz' ? `
    <div style="display:flex;flex-direction:column;align-items:center;gap:5px;padding-top:2px;">
      <p style="font-size:10px;color:rgba(255,255,255,.24);margin:0;
        font-family:'Inter',system-ui;">
        ${q.type === 'player'
          ? (q.a.length > 1 ? `Selecione os ${q.a.length} jogadores corretos` : 'Selecione o jogador correto')
          : (q.a.length > 1 ? `Selecione os ${q.a.length} times corretos`     : 'Selecione o time correto')
        } · toque para marcar</p>
      <button id="bconf" style="
          background:${sel.size > 0 ? qcat.col : 'rgba(255,255,255,.07)'};
          color:${sel.size > 0 ? '#060e08' : 'rgba(255,255,255,.2)'};
          font-size:16px;font-weight:900;padding:10px 44px;
          border-radius:24px;border:none;
          cursor:${sel.size > 0 ? 'pointer' : 'default'};
          letter-spacing:2px;transition:all .18s;
          font-family:'Bebas Neue','Impact',sans-serif;">CONFIRMAR</button>
    </div>`
    : `<div style="text-align:center;padding:6px 0;" id="rvl"></div>`}
  </div>`;
}

/* ═══════════════════════════════════════════════════
   RENDER + EVENT BINDING
═══════════════════════════════════════════════════ */
function go() {
  prevPts = pts; // snapshot before render (score-up only fires once)
  document.getElementById('ct').innerHTML = html();
  prevPts = pts; // prevent re-fire on subsequent re-renders without score change

  document.getElementById('cta-btn')?.addEventListener('click', () => { snd.swipe(); sc='difficulty'; go(); });
  document.getElementById('bhome')?.addEventListener('click',   () => { snd.swipe(); clearInterval(tmr); sc='home'; go(); });
  document.getElementById('bexit')?.addEventListener('click',   () => { snd.swipe(); clearInterval(tmr); sc='difficulty'; go(); });
  document.getElementById('bconf')?.addEventListener('click',   () => { if (sel.size > 0) doReveal(); });
  document.getElementById('brep')?.addEventListener('click',    () => { snd.swipe(); startGame(); });
  document.getElementById('bdiff')?.addEventListener('click',   () => { snd.swipe(); sc='difficulty'; go(); });

  document.querySelectorAll('.dc').forEach(d => d.addEventListener('click', () => {
    numQs   = parseInt(d.dataset.n);
    diffKey = d.dataset.key;
    snd.select();
    startGame();
  }));

  document.querySelectorAll('.b').forEach(b => b.addEventListener('click', () => {
    if (sc !== 'quiz') return;
    snd.tap();
    const id = b.dataset.id;
    sel.has(id) ? sel.delete(id) : sel.add(id);
    go();
  }));

  if (sc === 'reveal') {
    const rv = document.getElementById('rvl');
    if (rv && lastMsg) rv.innerHTML = lastMsg;
  }
}

/* ═══════════════════════════════════════════════════
   GAME LOGIC
═══════════════════════════════════════════════════ */
function startGame() {
  cat = buildMixedGame(numQs);
  qi = 0; sel.clear(); pts = 0; prevPts = 0; streak = 0;
  sc = 'quiz'; tLeft = 30; lastMsg = '';
  disp = getDisp(cat.qs[0]);
  startTmr();
  go();
}

function doReveal() {
  clearInterval(tmr);
  sc = 'reveal';

  const q     = cat.qs[qi];
  const rs    = new Set(q.a);
  const sa    = [...sel];
  const wrong = sa.filter(id => !rs.has(id)).length;
  const right = sa.filter(id =>  rs.has(id)).length;
  const p     = wrong === 0 && right === rs.size ? 3
              : wrong === 0 && right > 0          ? 1
              :                                     0;

  prevPts = pts;
  pts    += p;
  p === 3 ? streak++ : (streak = 0);

  if      (p === 3) snd.correct();
  else if (p === 1) snd.almost();
  else              snd.wrong();

  lastMsg = p === 3
    ? `<span style="font-size:15px;font-weight:800;color:#00e676;
        font-family:'Inter',system-ui;">✓ Perfeito! +3 pontos</span>`
    : p === 1
    ? `<span style="font-size:15px;font-weight:800;color:#FFD700;
        font-family:'Inter',system-ui;">~ Quase! +1 ponto</span>`
    : `<span style="font-size:15px;font-weight:800;color:#f44336;
        font-family:'Inter',system-ui;">✗ Errou! +0 pontos</span>`;

  go();

  setTimeout(() => {
    qi++;
    sel.clear();
    lastMsg = '';
    if (qi >= cat.qs.length) {
      sc = 'end';
      if (scores[diffKey] === undefined || pts > scores[diffKey]) scores[diffKey] = pts;
    } else {
      sc    = 'quiz';
      tLeft = 30;
      disp  = getDisp(cat.qs[qi]);
      startTmr();
    }
    go();
  }, 2200);
}

function startTmr() {
  clearInterval(tmr);
  tmr = setInterval(() => {
    tLeft = Math.max(0, tLeft - 1);
    const tf = document.getElementById('tf');
    if (tf) {
      tf.style.width      = (tLeft / 30 * 100) + '%';
      tf.style.background = tLeft > 10 ? cat.col : tLeft > 5 ? '#FF9800' : '#F44336';
      if (tLeft <= 5 && !tf.classList.contains('timer-low')) tf.classList.add('timer-low');
    }
    if (tLeft <= 0 && sc === 'quiz') doReveal();
  }, 1000);
}

/* ── Boot ── */
go();

/* ── Service Worker registration ── */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .catch(() => {}); // silently fail (e.g. file:// protocol)
  });
}
</script>
</body>
</html>
