/* ═══════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════ */
function getDisp(q) {
  const right = q.a.map(id => CL.find(c => c.id === id)).filter(Boolean);
  const wrong  = CL.filter(c => !q.a.includes(c.id)).sort(() => Math.random() - .5);
  return [...right, ...wrong.slice(0, 10 - right.length)].sort(() => Math.random() - .5);
}

/* ═══════════════════════════════════════════════════
   SVG — STADIUM ILLUSTRATION
   Used in the Estádios question card
═══════════════════════════════════════════════════ */
function mkStad(s) {
  const ov = s.oval;
  const field = ov
    ? `<ellipse cx="30" cy="30" rx="25" ry="20" fill="#3A7030"/>
       <ellipse cx="30" cy="30" rx="25" ry="20" fill="none" stroke="#FFF" stroke-width="1.5"/>
       <ellipse cx="30" cy="30" rx="14" ry="9" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1"/>
       <line x1="30" y1="10" x2="30" y2="50" stroke="rgba(255,255,255,.4)" stroke-width="1"/>`
    : `<rect x="6" y="9" width="48" height="42" fill="#3A7030"/>
       <rect x="6" y="9" width="48" height="42" fill="none" stroke="#FFF" stroke-width="1.5"/>
       <rect x="17" y="9" width="26" height="42" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
       <line x1="6" y1="30" x2="54" y2="30" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
       <circle cx="30" cy="30" r="6" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1"/>`;
  return `<rect width="60" height="60" fill="#2A5020"/>
    ${field}
    <text x="30" y="57" text-anchor="middle" font-size="6.5" font-weight="700"
      fill="rgba(255,255,255,.7)" font-family="system-ui">${s.name}</text>`;
}

/* ═══════════════════════════════════════════════════
   SVG — CLUB CRESTS
   Each crest is clipped to a hexagonal shield path.
   Returns inner SVG markup (no <svg> wrapper).
═══════════════════════════════════════════════════ */
function crest(id) {
  const SH = 'M30 3L57 17L57 43L30 57L3 43L3 17Z'; // shield outline
  const ci  = 'CX' + id.replace(/\W/g, '');         // unique clipPath id

  // ── shorthand helpers ──
  const D   = `<defs><clipPath id="${ci}"><path d="${SH}"/></clipPath></defs>`;
  const B   = `<path d="${SH}" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="2"/>`;
  const c   = `clip-path="url(#${ci})"`;
  const r   = (x,y,w,h,f)  => `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${f}" ${c}/>`;
  const pg  = (pts,f)       => `<polygon points="${pts}" fill="${f}" ${c}/>`;
  const el  = (cx,cy,rx,ry,f)=> `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="${f}" ${c}/>`;
  const fc  = (cx,cy,r2,f)  => `<circle cx="${cx}" cy="${cy}" r="${r2}" fill="${f}" ${c}/>`;
  const ln  = (x1,y1,x2,y2,s,w)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${s}" stroke-width="${w}" ${c}/>`;

  // ── 5-pointed star helper ──
  function star(cx, cy, ro, ri, f) {
    let pts = '';
    for (let i = 0; i < 10; i++) {
      const a = Math.PI / 5 * i - Math.PI / 2;
      const rad = i % 2 ? ri : ro;
      pts += `${cx + rad * Math.cos(a)},${cy + rad * Math.sin(a)} `;
    }
    return `<polygon points="${pts.trim()}" fill="${f}" ${c}/>`;
  }

  switch (id) {

    /* ── Rio de Janeiro ── */
    case 'flamengo':
      // 4 horizontal bands: black / red / black / red
      return D + r(0,0,60,60,'#111') + r(0,15,60,15,'#CC1011')
               + r(0,30,60,15,'#111') + r(0,45,60,15,'#CC1011') + B;

    case 'fluminense':
      // 3 vertical stripes: dark-red / white / dark-green
      return D + r(0,0,20,60,'#8B1D3B') + r(20,0,20,60,'#EEE') + r(40,0,20,60,'#2E7D52') + B;

    case 'vasco':
      // White shield, diagonal black sash, white cross on sash
      return D + r(0,0,60,60,'#EEE')
               + pg('0,18 42,60 60,60 60,42 18,0 0,0','#111')
               + r(25,5,10,50,'#EEE') + r(5,25,50,10,'#EEE') + B;

    case 'botafogo':
      // Black with a lone white 5-pointed star
      return D + r(0,0,60,60,'#111') + star(30,29,18,8,'#EEE') + B;

    /* ── São Paulo ── */
    case 'corinthians':
      // Vertical black/white split + faint ring
      return D + r(0,0,60,60,'#111') + r(30,0,30,60,'#EEE')
               + `<circle cx="30" cy="27" r="13" fill="none"
                   stroke="rgba(120,120,120,.6)" stroke-width="3" ${c}/>`
               + fc(30,27,3,'rgba(120,120,120,.5)') + B;

    case 'palmeiras':
      // Green with white oval and serif "P"
      return D + r(0,0,60,60,'#005C30') + el(30,30,16,20,'#FFF')
               + `<text x="30" y="37" text-anchor="middle" font-size="22" font-weight="900"
                   fill="#005C30" font-family="serif" ${c}>P</text>` + B;

    case 'saopaulo':
      // Horizontal stripes: red / black / white
      return D + r(0,0,60,20,'#CC0000') + r(0,20,60,12,'#111') + r(0,32,60,28,'#EEE') + B;

    case 'santos':
      // Black with 8-spoke ship's helm (wheel)
      return D + r(0,0,60,60,'#111')
               + `<circle cx="30" cy="28" r="17" fill="none" stroke="#EEE" stroke-width="2.5" ${c}/>`
               + ln(30,11,30,45,'#EEE',2) + ln(13,28,47,28,'#EEE',2)
               + ln(18,15,42,41,'#EEE',1.5) + ln(42,15,18,41,'#EEE',1.5)
               + fc(30,28,4,'#EEE') + B;

    /* ── Rio Grande do Sul ── */
    case 'gremio':
      // 3 horizontal bands: blue / black / white
      return D + r(0,0,60,22,'#3E72B8') + r(0,22,60,14,'#111') + r(0,36,60,24,'#EEE') + B;

    case 'internacional':
      // Red with a golden star
      return D + r(0,0,60,60,'#C00000') + star(30,28,17,7,'#FFD700') + B;

    /* ── Minas Gerais ── */
    case 'cruzeiro':
      // Dark blue with 4 stars (Cruzeiro do Sul constellation)
      return D + r(0,0,60,60,'#002F8B')
               + star(30,16,9,4,'#EEE')   // top (larger)
               + star(18,32,6,3,'#EEE')   // left
               + star(42,32,6,3,'#EEE')   // right
               + star(30,44,6,3,'#EEE')   // bottom
               + B;

    case 'atleticomg':
      // Black with simplified white rooster (Galo)
      return D + r(0,0,60,60,'#111')
               + el(30,21,9,10,'#EEE')   // head
               + el(30,40,12,11,'#EEE')  // body
               + pg('27,11 28.5,6 30,4 31.5,6 33,11 31,12 30,9 29,12','#CC0000') // comb
               + pg('38,22 45,24 38,26','#EE8800')  // beak
               + B;

    case 'americamg':
      // Green with white rabbit face (Coelho)
      return D + r(0,0,60,60,'#1A6B3C')
               + el(21,17,7,13,'#EEE')     // left ear
               + el(39,17,7,13,'#EEE')     // right ear
               + fc(30,38,12,'#EEE')       // head
               + fc(25,37,2.5,'#1A6B3C')   // left eye
               + fc(35,37,2.5,'#1A6B3C')   // right eye
               + el(30,43,3.5,2,'#FF9999') // nose
               + B;

    /* ── Paraná ── */
    case 'atleticopr':
      // Red top / black bottom with white target circle + vertical line
      return D + r(0,0,60,30,'#C00000') + r(0,30,60,30,'#111')
               + `<circle cx="30" cy="30" r="17" fill="none"
                   stroke="#EEE" stroke-width="2.5" ${c}/>`
               + ln(30,13,30,47,'#EEE',3)
               + fc(30,30,5,'#EEE') + B;

    case 'coritiba':
      // Green with 2 white horizontal bands
      return D + r(0,0,60,60,'#005C30') + r(0,10,60,10,'#EEE') + r(0,40,60,10,'#EEE') + B;

    /* ── Bahia ── */
    case 'bahia':
      // Blue / red vertical halves with white cross
      return D + r(0,0,30,60,'#003A9B') + r(30,0,30,60,'#CC0000')
               + ln(0,30,60,30,'#EEE',2) + ln(30,0,30,60,'#EEE',2) + B;

    case 'vitoria':
      // Red with 3 black vertical stripes
      return D + r(0,0,60,60,'#B80000')
               + r(9,0,10,60,'#111') + r(27,0,10,60,'#111') + r(45,0,10,60,'#111') + B;

    /* ── Ceará ── */
    case 'fortaleza':
      // Blue with red bottom band and gold star
      return D + r(0,0,60,60,'#003A9B') + r(0,42,60,18,'#A81C1C')
               + star(30,22,13,5,'#FFD700') + B;

    case 'ceara':
      // Black / white / black horizontal thirds
      return D + r(0,0,60,22,'#111') + r(0,22,60,16,'#EEE') + r(0,38,60,22,'#111') + B;

    /* ── Pernambuco ── */
    case 'sport':
      // Red left / black right with white star
      return D + r(0,0,30,60,'#C00000') + r(30,0,30,60,'#111')
               + star(30,29,13,5,'#EEE') + B;

    case 'nautico':
      // Red with white anchor
      return D + r(0,0,60,60,'#B80000')
               + `<circle cx="30" cy="17" r="7" fill="none" stroke="#EEE" stroke-width="3" ${c}/>`
               + ln(30,24,30,50,'#EEE',3)
               + ln(20,31,40,31,'#EEE',2.5)
               + `<path d="M16 50Q14 44 22 41Q30 38 38 41Q46 44 44 50"
                   fill="none" stroke="#EEE" stroke-width="2.5" ${c}/>` + B;

    /* ── São Paulo interior / other ── */
    case 'pontepreta':
      // 3×3 black and white checkerboard
      return D
        + r(0,0,20,20,'#EEE')  + r(20,0,20,20,'#111') + r(40,0,20,20,'#EEE')
        + r(0,20,20,20,'#111') + r(20,20,20,20,'#EEE') + r(40,20,20,20,'#111')
        + r(0,40,20,20,'#EEE') + r(20,40,20,20,'#111') + r(40,40,20,20,'#EEE') + B;

    case 'bragantino':
      // Red with large white star
      return D + r(0,0,60,60,'#B80000') + star(30,28,18,7,'#EEE') + B;

    case 'guarani':
      // Green with white upward arrow
      return D + r(0,0,60,60,'#1A6B3C')
               + pg('30,7 38,23 33,23 33,51 27,51 27,23 22,23','#EEE') + B;

    /* ── Santa Catarina ── */
    case 'criciuma':
      // Black top / yellow bottom
      return D + r(0,0,60,30,'#111') + r(0,30,60,30,'#D4A800') + B;

    /* ── Fallback ── */
    default:
      return D + r(0,0,60,60,'#333')
               + `<text x="30" y="33" text-anchor="middle" font-size="11"
                   font-weight="900" fill="#EEE" font-family="system-ui" ${c}>
                   ${id.substring(0,3).toUpperCase()}</text>` + B;
  }
}

/* ═══════════════════════════════════════════════════
   BADGE — renders one club tile in the 5×2 grid
═══════════════════════════════════════════════════ */
function badge(club) {
  const isSel  = sel.has(club.id);
  const isAns  = sc === 'reveal' && cat.qs[qi].a.includes(club.id);
  const isWrong= sc === 'reveal' && isSel && !isAns;

  let ring = '';
  if (sc === 'reveal') {
    if (isAns)   ring = 'box-shadow:0 0 0 3px #00e676,0 0 20px rgba(0,230,118,.45);';
    else if (isWrong) ring = 'box-shadow:0 0 0 3px #f44336,0 0 20px rgba(244,67,54,.45);';
  } else if (isSel) {
    ring = `box-shadow:0 0 0 3px ${cat.col},0 0 16px ${cat.col}66;transform:scale(1.06);`;
  }

  return `<div class="b" data-id="${club.id}" style="
      width:100%;aspect-ratio:1;border-radius:9px;cursor:pointer;
      position:relative;overflow:hidden;user-select:none;
      background:rgba(0,0,0,.6);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      transition:transform .12s,box-shadow .12s;${ring}">
    <svg viewBox="0 0 60 60" width="82%" height="82%">${crest(club.id)}</svg>
    <span style="font-size:7.5px;color:rgba(255,255,255,.65);text-align:center;
      font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,1);
      padding:0 3px;line-height:1.2;position:absolute;bottom:3px;left:0;right:0;">
      ${club.n}</span>
  </div>`;
}

          ? `<div style="position:absolute;top:9px;right:9px;font-size:9px;
              color:${c.col};font-weight:800;background:${c.col}18;
              border-radius:8px;padding:2px 6px;">★${scores[c.id]}</div>` : ''}
      </div>`).join('')}
      <!-- Coming soon slot -->
      <div style="background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.1);
          border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;
          align-items:center;justify-content:center;min-height:126px;gap:5px;">
        <div style="font-size:20px;opacity:.35;">🔒</div>
        <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.2);">Em breve</div>
        <div style="font-size:9px;color:rgba(255,255,255,.15);text-align:center;line-height:1.4;">

    <p style="font-size:10.5px;color:rgba(255,255,255,.22);text-align:center;margin:0;">

  </div>`;

  /* ── End Screen ── */
  if (sc === 'end') {
    const max = cat.qs.length * 3;
    const pct = Math.round(pts / max * 100);
    const [em, msg] = pct >= 80 ? ['🏆','Craque!'] : pct >= 50 ? ['⚽','Boa jogada!'] : ['😅','Treina mais!'];
    return `
    <div style="display:flex;flex-direction:column;align-items:center;
      justify-content:center;min-height:500px;padding:2rem;text-align:center;gap:10px;">
      <div style="font-size:11px;font-weight:700;letter-spacing:2px;color:${cat.col};">
        ${cat.emoji} ${cat.name.toUpperCase()}</div>

  const portSVG = (q.port && cat.id === 'lendas')
    ? `<svg viewBox="0 0 60 72" width="46" height="55"

  return `

    : `<div style="text-align:center;padding:6px 0;" id="rvl"></div>`}
  </div>`;
}

/* ═══════════════════════════════════════════════════
   RENDER + EVENT BINDING
═══════════════════════════════════════════════════ */
function go() {
  document.getElementById('ct').innerHTML = html();

  document.getElementById('bh')?.addEventListener('click',    () => { sc='categories'; go(); });
  document.getElementById('bhome')?.addEventListener('click', () => { sc='home'; go(); });
  document.getElementById('bexit')?.addEventListener('click', () => { clearInterval(tmr); sc='categories'; go(); });
  document.getElementById('bconf')?.addEventListener('click', () => { if (sel.size > 0) doReveal(); });
  document.getElementById('brep')?.addEventListener('click',  () => startCat(cat));
  document.getElementById('bcats')?.addEventListener('click', () => { sc='categories'; go(); });

  document.querySelectorAll('.cc').forEach(c => c.addEventListener('click', () => {
    const found = CATS.find(x => x.id === c.dataset.cat);
    if (found) startCat(found);
  }));

  document.querySelectorAll('.b').forEach(b => b.addEventListener('click', () => {
    if (sc !== 'quiz') return;
    const id = b.dataset.id;
    sel.has(id) ? sel.delete(id) : sel.add(id);
    go();
  }));

  // Re-inject reveal message after re-render
  if (sc === 'reveal') {
    const rv = document.getElementById('rvl');
    if (rv && lastMsg) rv.innerHTML = lastMsg;
  }
}

/* ═══════════════════════════════════════════════════
   GAME LOGIC
═══════════════════════════════════════════════════ */
function startCat(c) {
  cat = c; qi = 0; sel.clear(); pts = 0; streak = 0;
  sc = 'quiz'; tLeft = 30; lastMsg = '';
  disp = getDisp(cat.qs[0]);
  startTmr();
  go();
}

function doReveal() {
  clearInterval(tmr);
  sc = 'reveal';

  const q      = cat.qs[qi];
  const rs     = new Set(q.a);
  const sa     = [...sel];
  const wrong  = sa.filter(id => !rs.has(id)).length;
  const right  = sa.filter(id =>  rs.has(id)).length;
  const p      = wrong === 0 && right === rs.size ? 3
               : wrong === 0 && right > 0         ? 1
               :                                    0;

  pts += p;
  p === 3 ? streak++ : (streak = 0);

  lastMsg = p === 3
    ? `<span style="font-size:15px;font-weight:800;color:#00e676;">✓ Perfeito! +3 pontos</span>`
    : p === 1
    ? `<span style="font-size:15px;font-weight:800;color:#FFD700;">~ Quase! +1 ponto</span>`
    : `<span style="font-size:15px;font-weight:800;color:#f44336;">✗ Errou! +0 pontos</span>`;

  go();

  setTimeout(() => {
    qi++;
    sel.clear();
    lastMsg = '';
    if (qi >= cat.qs.length) {
      sc = 'end';
      if (scores[cat.id] === undefined || pts > scores[cat.id]) scores[cat.id] = pts;
    } else {
      sc    = 'quiz';
      tLeft = 30;
      disp  = getDisp(cat.qs[qi]);
      startTmr();
    }
    go();
  }, 2200);
}

function startTmr() {
  clearInterval(tmr);
  tmr = setInterval(() => {
    tLeft = Math.max(0, tLeft - 1);
    const tf = document.getElementById('tf');
    if (tf) {
      tf.style.width      = (tLeft / 30 * 100) + '%';
      tf.style.background = tLeft > 10 ? cat.col : tLeft > 5 ? '#FF9800' : '#F44336';
    }
    if (tLeft <= 0 && sc === 'quiz') doReveal();
  }, 1000);
}

/* ── Boot ── */
go();
</script>
